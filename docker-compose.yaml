services:
  cat:
    image: localhost:8081/mon-api:1.0.0
    container_name: cat
    environment:
      - PET=${PET_CAT}
      - PORT=${API_PORT}
    networks:
      - app-network
    restart: always
    # healthcheck:
    #   test: ["CMD", "node", "-e", "require('http').get('http://localhost:${API_PORT}/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 3

  dog:
    image: localhost:8081/mon-api:1.0.0
    container_name: dog
    environment:
      - PET=${PET_DOG}
      - PORT=${API_PORT}
    networks:
      - app-network
    restart: always
    # healthcheck:
    #   test: ["CMD", "node", "-e", "require('http').get('http://localhost:${API_PORT}/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 3

  reverse-proxy:
    image: nginx:alpine
    container_name: reverse-proxy
    ports:
      - "40110:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network
    depends_on:
      # cat: { condition: service_healthy }
      # dog: { condition: service_healthy }
      - cat
      - dog
    restart: always

  prometheus:
    image: prom/prometheus
    ports:
      - "40130:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro  
      - prometheus_data:/prometheus
    networks:
      - app-network

  grafana:
    image: grafana/grafana
    ports:
      - "40120:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro 
      - grafana_data:/var/lib/grafana
    networks:
      - app-network

  node-exporter:
    image: prom/node-exporter
    networks:
      - app-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor
    networks:
      - app-network

  portainer:
    image: portainer/portainer-ce
    ports:
      - "40140:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  portainer_data:
  grafana_data:    
  prometheus_data: